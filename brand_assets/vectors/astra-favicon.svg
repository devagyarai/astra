<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    
    <defs>
        <!-- Primary Starlight Flare Gradient -->
        <linearGradient id="fav_starGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="35%" stop-color="#FFC857"/>
            <stop offset="70%" stop-color="#6D5DF6"/>
            <stop offset="100%" stop-color="#4F46E5"/>
        </linearGradient>

        <!-- Star Horizontal Glow Gradient -->
        <linearGradient id="fav_starHorizGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6D5DF6" stop-opacity="0.2"/>
            <stop offset="50%" stop-color="#FFFFFF"/>
            <stop offset="100%" stop-color="#6D5DF6" stop-opacity="0.2"/>
        </linearGradient>

        <!-- Star Radial Core Glow -->
        <radialGradient id="fav_coreGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
            <stop offset="30%" stop-color="#FFC857" stop-opacity="0.9"/>
            <stop offset="70%" stop-color="#6D5DF6" stop-opacity="0.45"/>
            <stop offset="100%" stop-color="#6D5DF6" stop-opacity="0"/>
        </radialGradient>

        <!-- Horizon Arc Gradient -->
        <linearGradient id="fav_horizonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6D5DF6" stop-opacity="0.15"/>
            <stop offset="25%" stop-color="#6D5DF6" stop-opacity="0.85"/>
            <stop offset="50%" stop-color="#FFC857" stop-opacity="1"/>
            <stop offset="75%" stop-color="#6D5DF6" stop-opacity="0.85"/>
            <stop offset="100%" stop-color="#6D5DF6" stop-opacity="0.15"/>
        </linearGradient>

        <!-- Light Theme Horizon Arc Gradient -->
        <linearGradient id="fav_horizonLightGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6D5DF6" stop-opacity="0.25"/>
            <stop offset="25%" stop-color="#6D5DF6" stop-opacity="0.95"/>
            <stop offset="50%" stop-color="#D97706" stop-opacity="1"/>
            <stop offset="75%" stop-color="#6D5DF6" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="#6D5DF6" stop-opacity="0.25"/>
        </linearGradient>

        <!-- App Icon Background Gradient -->
        <linearGradient id="fav_appIconBg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1E1B4B"/>
            <stop offset="45%" stop-color="#0B1020"/>
            <stop offset="100%" stop-color="#030712"/>
        </linearGradient>
    </defs>
    
    <rect width="64" height="64" rx="14" fill="#0B1020"/>
    
    <g id="fav_horizon_rise_mark">
        <circle cx="32" cy="30" r="10.875" fill="url(#fav_coreGlow)" opacity="0.9" />
        
        <!-- Horizon Arc -->
        <path d="M 5.900000000000002,47.4 Q 32,36.96 58.099999999999994,47.4 Q 32,39.28 5.900000000000002,47.4 Z" 
              fill="url(#fav_horizonGradient)" />

        <!-- Star Diagonal Rays -->
        <path d="M 23.3,21.3 Q 32,30 30.985,28.985 Q 32,30 23.3,21.3 Z
                 M 40.7,21.3 Q 32,30 33.015,28.985 Q 32,30 40.7,21.3 Z
                 M 23.3,38.7 Q 32,30 30.985,31.015 Q 32,30 23.3,38.7 Z
                 M 40.7,38.7 Q 32,30 33.015,31.015 Q 32,30 40.7,38.7 Z"
              fill="url(#fav_starGradient)" opacity="0.75" />

        <!-- Star Horizontal Flare -->
        <path d="M 13.875,30 Q 32,28.115000000000002 32,30 Q 32,31.884999999999998 13.875,30 Z
                 M 50.125,30 Q 32,28.115000000000002 32,30 Q 32,31.884999999999998 50.125,30 Z"
              fill="url(#fav_starGradient)" />

        <!-- Star Vertical Main Flare -->
        <path d="M 32,8.975000000000001 Q 29.68,30 32,30 Q 34.32,30 32,8.975000000000001 Z
                 M 32,48.849999999999994 Q 29.68,30 32,30 Q 34.32,30 32,48.849999999999994 Z"
              fill="url(#fav_starGradient)" />
              
        <!-- Core Diamond Apex Sharpener -->
        <polygon points="32,28.26 33.74,30 32,31.74 30.26,30" 
                 fill="#FFFFFF" opacity="0.95"/>
    </g>
    
</svg>