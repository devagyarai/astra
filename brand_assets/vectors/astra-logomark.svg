<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
    
    <defs>
        <!-- Primary Starlight Flare Gradient -->
        <linearGradient id="logomark_starGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="35%" stop-color="#FFC857"/>
            <stop offset="70%" stop-color="#6D5DF6"/>
            <stop offset="100%" stop-color="#4F46E5"/>
        </linearGradient>

        <!-- Star Horizontal Glow Gradient -->
        <linearGradient id="logomark_starHorizGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6D5DF6" stop-opacity="0.2"/>
            <stop offset="50%" stop-color="#FFFFFF"/>
            <stop offset="100%" stop-color="#6D5DF6" stop-opacity="0.2"/>
        </linearGradient>

        <!-- Star Radial Core Glow -->
        <radialGradient id="logomark_coreGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
            <stop offset="30%" stop-color="#FFC857" stop-opacity="0.9"/>
            <stop offset="70%" stop-color="#6D5DF6" stop-opacity="0.45"/>
            <stop offset="100%" stop-color="#6D5DF6" stop-opacity="0"/>
        </radialGradient>

        <!-- Horizon Arc Gradient -->
        <linearGradient id="logomark_horizonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6D5DF6" stop-opacity="0.15"/>
            <stop offset="25%" stop-color="#6D5DF6" stop-opacity="0.85"/>
            <stop offset="50%" stop-color="#FFC857" stop-opacity="1"/>
            <stop offset="75%" stop-color="#6D5DF6" stop-opacity="0.85"/>
            <stop offset="100%" stop-color="#6D5DF6" stop-opacity="0.15"/>
        </linearGradient>

        <!-- Light Theme Horizon Arc Gradient -->
        <linearGradient id="logomark_horizonLightGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6D5DF6" stop-opacity="0.25"/>
            <stop offset="25%" stop-color="#6D5DF6" stop-opacity="0.95"/>
            <stop offset="50%" stop-color="#D97706" stop-opacity="1"/>
            <stop offset="75%" stop-color="#6D5DF6" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="#6D5DF6" stop-opacity="0.25"/>
        </linearGradient>

        <!-- App Icon Background Gradient -->
        <linearGradient id="logomark_appIconBg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1E1B4B"/>
            <stop offset="45%" stop-color="#0B1020"/>
            <stop offset="100%" stop-color="#030712"/>
        </linearGradient>
    </defs>
    
    <rect width="100%" height="100%" fill="#0B1020"/>
    
    <g id="logomark_horizon_rise_mark">
        <circle cx="250" cy="240" r="82.5" fill="url(#logomark_coreGlow)" opacity="0.9" />
        
        <!-- Horizon Arc -->
        <path d="M 51.99999999999997,372.0 Q 250,292.8 448.0,372.0 Q 250,310.4 51.99999999999997,372.0 Z" 
              fill="url(#logomark_horizonGradient)" />

        <!-- Star Diagonal Rays -->
        <path d="M 184.0,174.0 Q 250,240 242.3,232.3 Q 250,240 184.0,174.0 Z
                 M 316.0,174.0 Q 250,240 257.7,232.3 Q 250,240 316.0,174.0 Z
                 M 184.0,306.0 Q 250,240 242.3,247.7 Q 250,240 184.0,306.0 Z
                 M 316.0,306.0 Q 250,240 257.7,247.7 Q 250,240 316.0,306.0 Z"
              fill="url(#logomark_starGradient)" opacity="0.75" />

        <!-- Star Horizontal Flare -->
        <path d="M 112.5,240 Q 250,225.7 250,240 Q 250,254.3 112.5,240 Z
                 M 387.5,240 Q 250,225.7 250,240 Q 250,254.3 387.5,240 Z"
              fill="url(#logomark_starGradient)" />

        <!-- Star Vertical Main Flare -->
        <path d="M 250,80.5 Q 232.4,240 250,240 Q 267.6,240 250,80.5 Z
                 M 250,383.0 Q 232.4,240 250,240 Q 267.6,240 250,383.0 Z"
              fill="url(#logomark_starGradient)" />
              
        <!-- Core Diamond Apex Sharpener -->
        <polygon points="250,226.8 263.2,240 250,253.2 236.8,240" 
                 fill="#FFFFFF" opacity="0.95"/>
    </g>
    
</svg>