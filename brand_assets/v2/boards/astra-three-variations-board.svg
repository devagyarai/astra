                 M 219.89999999999998,380.1 Q 285,315 277.125,322.875 Q 285,315 219.89999999999998,380.1 Z
                 M 350.1,380.1 Q 285,315 292.875,322.875 Q 285,315 350.1,380.1 Z"
              fill="url(#b3v_c_starGradientV2)" opacity="0.75" />
        <path d="M 150.6,315 Q 285,300.825 285,315 Q 285,329.175 150.6,315 Z
                 M 419.4,315 Q 285,300.825 285,315 Q 285,329.175 419.4,315 Z"
              fill="url(#b3v_c_starGradientV2)" />
        <path d="M 285,159.6 Q 267.675,315 285,315 Q 302.325,315 285,159.6 Z
                 M 285,453.6 Q 267.675,315 285,315 Q 302.325,315 285,453.6 Z"
              fill="url(#b3v_c_starGradientV2)" />
        <polygon points="285,301.35 298.65,315 285,328.65 271.35,315" 
                 fill="#FFFFFF" opacity="0.98"/>
    </g>
    
        
        <text x="40" y="540" font-family="system-ui, sans-serif" font-size="18px" font-weight="700" fill="#FFFFFF">DESIGN CHARACTERISTICS</text>
        <text x="40" y="575" font-family="system-ui, sans-serif" font-size="14px" fill="#A1A7BB">• Hidden 'A' negative space chevron integration</text>
        <text x="40" y="605" font-family="system-ui, sans-serif" font-size="14px" fill="#A1A7BB">• Radiant starlight core aura &amp; micro diamond</text>
        <text x="40" y="635" font-family="system-ui, sans-serif" font-size="14px" fill="#A1A7BB">• Panoramic planetary horizon sweep</text>
        <text x="40" y="665" font-family="system-ui, sans-serif" font-size="14px" fill="#A1A7BB">• Supreme emotional resonance &amp; elegance</text>

        <rect x="40" y="710" width="490" height="300" rx="12" fill="#0A0F1D"/>
        <text x="60" y="745" font-family="system-ui, sans-serif" font-size="15px" font-weight="700" fill="#FFC857">RECOMMENDED BRAND DIRECTION</text>
        <text x="60" y="780" font-family="system-ui, sans-serif" font-size="13px" fill="#A1A7BB">The definitive identity for ASTRA. Merges subtle</text>
        <text x="60" y="805" font-family="system-ui, sans-serif" font-size="13px" fill="#A1A7BB">hidden intelligence with unforgettable visual</text>
        <text x="60" y="830" font-family="system-ui, sans-serif" font-size="13px" fill="#A1A7BB">impact. Built to represent a billion-dollar brand.</text>
