    <text x="80" y="80" font-family="system-ui, sans-serif" font-size="38px" font-weight="800" fill="#FFFFFF" letter-spacing="3px">ASTRA REFINED DIRECTIONS</text>
    <text x="80" y="125" font-family="system-ui, sans-serif" font-size="20px" font-weight="500" fill="#6D5DF6">Three Siblings — Optical &amp; Identity Exploration</text>

    <!-- Variation A -->
    <g transform="translate(80, 220)">
