              fill="url(#b3v_b_starGradientV2)" />
    </g>
    
        
        <text x="40" y="540" font-family="system-ui, sans-serif" font-size="18px" font-weight="700" fill="#FFFFFF">DESIGN CHARACTERISTICS</text>
        <text x="40" y="575" font-family="system-ui, sans-serif" font-size="14px" fill="#A1A7BB">• Golden Ratio (1 : 1.618) mathematical proportion</text>
        <text x="40" y="605" font-family="system-ui, sans-serif" font-size="14px" fill="#A1A7BB">• Authoritative corporate visual weight</text>
        <text x="40" y="635" font-family="system-ui, sans-serif" font-size="14px" fill="#A1A7BB">• Smooth quadratic horizon curvature</text>
        <text x="40" y="665" font-family="system-ui, sans-serif" font-size="14px" fill="#A1A7BB">• Balanced core optical junction</text>

        <rect x="40" y="710" width="490" height="300" rx="12" fill="#0A0F1D"/>
        <text x="60" y="745" font-family="system-ui, sans-serif" font-size="15px" font-weight="700" fill="#6D5DF6">REASONING &amp; SCALABILITY</text>
        <text x="60" y="780" font-family="system-ui, sans-serif" font-size="13px" fill="#A1A7BB">Tailored for enterprise software OS platforms.</text>
        <text x="60" y="805" font-family="system-ui, sans-serif" font-size="13px" fill="#A1A7BB">Communicates trust, stability, reliability, and</text>
        <text x="60" y="830" font-family="system-ui, sans-serif" font-size="13px" fill="#A1A7BB">institutional authority for B2B deployments.</text>
    </g>

    <!-- Variation C (Flagship) -->
    <g transform="translate(1350, 220)">
