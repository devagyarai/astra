        <text x="60" y="805" font-family="system-ui, sans-serif" font-size="13px" fill="#A1A7BB">Performs flawlessly on dark terminals, e-ink</text>
        <text x="60" y="830" font-family="system-ui, sans-serif" font-size="13px" fill="#A1A7BB">displays, micro favicons, and low-res screens.</text>
    </g>

