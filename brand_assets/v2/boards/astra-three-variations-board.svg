        <path d="M 175.0,310 L 285,300.0 L 395.0,310 L 285,320.0 Z" 
              fill="#FFFFFF" />
    </g>
    
        
        <text x="40" y="540" font-family="system-ui, sans-serif" font-size="18px" font-weight="700" fill="#FFFFFF">DESIGN CHARACTERISTICS</text>
        <text x="40" y="575" font-family="system-ui, sans-serif" font-size="14px" fill="#A1A7BB">• Razor-sharp primitive vector strokes</text>
        <text x="40" y="605" font-family="system-ui, sans-serif" font-size="14px" fill="#A1A7BB">• Maximum silhouette recognition at 16×16</text>
        <text x="40" y="635" font-family="system-ui, sans-serif" font-size="14px" fill="#A1A7BB">• Zero gradient dependency for high contrast</text>
        <text x="40" y="665" font-family="system-ui, sans-serif" font-size="14px" fill="#A1A7BB">• Single-taper optical horizon sweep</text>

