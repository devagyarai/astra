        <text x="40" y="90" font-family="system-ui, sans-serif" font-size="16px" font-weight="600" fill="#FFC857">Ultra Minimal</text>
        
        <rect x="40" y="120" width="490" height="380" rx="14" fill="#050814"/>
        
    <g id="b3v_a_variant_a_mark">
        <path d="M 125.0,425.0 Q 285,362.0 445.0,425.0 Q 285,374.0 125.0,425.0 Z" 
