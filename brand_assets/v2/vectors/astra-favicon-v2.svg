    <rect width="64" height="64" rx="14" fill="#0B1020"/>
    
    <g id="fav2_variant_c_flagship_mark">
        <circle cx="32" cy="30" r="10.875" fill="url(#fav2_coreGlowV2)" opacity="0.95" />
        <path d="M 5.175000000000001,47.69 Q 32,36.67 58.825,47.69 Q 32,39.135 5.175000000000001,47.69 Z" 
              fill="url(#fav2_horizonGradientV2)" />
        <path d="M 23.009999999999998,21.009999999999998 Q 32,30 30.9125,28.9125 Q 32,30 23.009999999999998,21.009999999999998 Z
                 M 40.99,21.009999999999998 Q 32,30 33.0875,28.9125 Q 32,30 40.99,21.009999999999998 Z
                 M 23.009999999999998,38.99 Q 32,30 30.9125,31.0875 Q 32,30 23.009999999999998,38.99 Z
                 M 40.99,38.99 Q 32,30 33.0875,31.0875 Q 32,30 40.99,38.99 Z"
              fill="url(#fav2_starGradientV2)" opacity="0.75" />
        <path d="M 13.440000000000001,30 Q 32,28.0425 32,30 Q 32,31.9575 13.440000000000001,30 Z
                 M 50.56,30 Q 32,28.0425 32,30 Q 32,31.9575 50.56,30 Z"
