        <linearGradient id="stk2_starGradientV2" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="30%" stop-color="#FFC857"/>
            <stop offset="65%" stop-color="#6D5DF6"/>
            <stop offset="100%" stop-color="#4F46E5"/>
