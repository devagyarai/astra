<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
    
    <defs>
        <!-- Flagship Starlight Radiant Gradient -->
        <linearGradient id="lm2_starGradientV2" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="30%" stop-color="#FFC857"/>
            <stop offset="65%" stop-color="#6D5DF6"/>
            <stop offset="100%" stop-color="#4F46E5"/>
        </linearGradient>

        <!-- Star Horizontal Glow Gradient -->
        <linearGradient id="lm2_starHorizGradientV2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6D5DF6" stop-opacity="0.15"/>
            <stop offset="50%" stop-color="#FFFFFF"/>
            <stop offset="100%" stop-color="#6D5DF6" stop-opacity="0.15"/>
        </linearGradient>

        <!-- Star Core Radial Aura -->
        <radialGradient id="lm2_coreGlowV2" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
            <stop offset="25%" stop-color="#FFC857" stop-opacity="0.95"/>
            <stop offset="60%" stop-color="#6D5DF6" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#6D5DF6" stop-opacity="0"/>
        </radialGradient>

        <!-- Horizon Arc Gradient Dark -->
        <linearGradient id="lm2_horizonGradientV2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6D5DF6" stop-opacity="0.1"/>
            <stop offset="20%" stop-color="#6D5DF6" stop-opacity="0.85"/>
            <stop offset="50%" stop-color="#FFC857" stop-opacity="1"/>
            <stop offset="80%" stop-color="#6D5DF6" stop-opacity="0.85"/>
            <stop offset="100%" stop-color="#6D5DF6" stop-opacity="0.1"/>
        </linearGradient>

        <!-- Horizon Arc Gradient Light -->
        <linearGradient id="lm2_horizonLightGradientV2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6D5DF6" stop-opacity="0.2"/>
            <stop offset="25%" stop-color="#6D5DF6" stop-opacity="0.95"/>
            <stop offset="50%" stop-color="#F59E0B" stop-opacity="1"/>
            <stop offset="75%" stop-color="#6D5DF6" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="#6D5DF6" stop-opacity="0.2"/>
        </linearGradient>

        <!-- App Icon Premium Gradient -->
        <linearGradient id="lm2_appIconBgV2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1E1B4B"/>
            <stop offset="40%" stop-color="#0B1020"/>
            <stop offset="100%" stop-color="#030712"/>
        </linearGradient>
    </defs>
    
    <rect width="100%" height="100%" fill="#0B1020"/>
    
    <g id="lm2_variant_c_flagship_mark">
        <circle cx="250" cy="240" r="82.5" fill="url(#lm2_coreGlowV2)" opacity="0.95" />
        <path d="M 46.49999999999997,374.20000000000005 Q 250,290.6 453.5,374.20000000000005 Q 250,309.3 46.49999999999997,374.20000000000005 Z" 
              fill="url(#lm2_horizonGradientV2)" />
        <path d="M 181.8,171.8 Q 250,240 241.75,231.75 Q 250,240 181.8,171.8 Z
                 M 318.2,171.8 Q 250,240 258.25,231.75 Q 250,240 318.2,171.8 Z
                 M 181.8,308.2 Q 250,240 241.75,248.25 Q 250,240 181.8,308.2 Z
                 M 318.2,308.2 Q 250,240 258.25,248.25 Q 250,240 318.2,308.2 Z"
              fill="url(#lm2_starGradientV2)" opacity="0.75" />
        <path d="M 109.19999999999999,240 Q 250,225.15 250,240 Q 250,254.85 109.19999999999999,240 Z
                 M 390.8,240 Q 250,225.15 250,240 Q 250,254.85 390.8,240 Z"
              fill="url(#lm2_starGradientV2)" />
        <path d="M 250,77.19999999999999 Q 231.85,240 250,240 Q 268.15,240 250,77.19999999999999 Z
                 M 250,385.20000000000005 Q 231.85,240 250,240 Q 268.15,240 250,385.20000000000005 Z"
              fill="url(#lm2_starGradientV2)" />
        <polygon points="250,225.7 264.3,240 250,254.3 235.7,240" 
                 fill="#FFFFFF" opacity="0.98"/>
    </g>
    
</svg>